<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Finanzas</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('PWA lista para instalar'))
        .catch(err => console.log('Error al registrar SW', err));
    });
  }
</script>
</head>
<body>

<div class="container">
  <button id="menuBtn" class="menu-btn-flotante">☰</button>

  <div id="sidebar" class="sidebar">
      <button id="cerrarSidebar" class="cerrar-sidebar">✖</button>
      <h3>Opciones</h3>
      <button id="btnGestionarCategorias" class="btn-sidebar">📁 Gestionar Categorías</button>
      <button id="btnExportar" class="btn-sidebar">📤 Exportar Datos</button>
      <button id="btnImportar" class="btn-sidebar">📥 Importar Datos</button>
<input type="file" id="importFile" accept="application/json" style="display:none;">
  </div>

  <h1 style="text-align:center;">Mis Finanzas</h1>

 <div class="selector-mes-container">
    <label>Mes: </label>
    <input type="month" id="mesSelect">
</div>

<div class="grafico-container" style="height:300px; width: 300px; background:var(--card); padding:15px; border-radius:50px; margin-bottom:20px; margin-left: auto; margin-right: auto; display: flex; justify-content: center; align-items: center;">
    <canvas id="graficoTorta"></canvas>
</div>

  <div class="tablas-container">
    <div class="tabla-wrapper">
      <div class="tabla-header"><h3>Ingresos</h3><button class="btnExpand" data-tipo="Ingresos">Expandir</button></div>
      <div class="tabla-contenido" id="tablaIngresos"></div>
    </div>
    <div class="tabla-wrapper">
      <div class="tabla-header"><h3>Egresos</h3><button class="btnExpand" data-tipo="Egresos">Expandir</button></div>
      <div class="tabla-contenido" id="tablaEgresos"></div>
    </div>
    <div class="tabla-wrapper">
      <div class="tabla-header"><h3>Ahorros</h3><button class="btnExpand" data-tipo="Ahorros">Expandir</button></div>
      <div class="tabla-contenido" id="tablaAhorros"></div>
    </div>
  </div>

  <div id="modalRegistro" class="modal">
    <div class="modal-content">
      <h2 id="modalTitulo">Nuevo Registro</h2>
      <form id="registroForm">
        <input type="date" id="fecha" required style="width:100%; margin-bottom:10px; padding:8px;">
        <select id="tipoSelect" required style="width:100%; margin-bottom:10px; padding:8px;">
          <option value="Ingresos">Ingresos</option>
          <option value="Egresos">Egresos</option>
          <option value="Ahorros">Ahorros</option>
        </select>
        <select id="categoriaSelect" required style="width:100%; margin-bottom:10px; padding:8px;"></select>
        <input type="number" id="monto" placeholder="Monto" step="0.01" required style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" id="detalle" placeholder="Detalle (opcional)" style="width:100%; margin-bottom:15px; padding:8px;">
        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn-save">Guardar</button>
            <button type="button" id="cerrarModal" class="btn-cancel">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalCategorias" class="modal">
    <div class="modal-content">
      <h2>Categorías</h2>
      <select id="tipoCatSelect" style="width:100%; margin-bottom:10px; padding:8px;">
        <option value="Ingresos">Ingresos</option>
        <option value="Egresos">Egresos</option>
        <option value="Ahorros">Ahorros</option>
      </select>
      <div id="listaCategorias" style="max-height: 200px; overflow-y: auto; margin-bottom:15px; border:1px solid #eee;"></div>
      <div style="display:flex; gap:5px;">
        <input type="text" id="nuevaCatNombre" placeholder="Nombre..." style="flex:1; padding:8px;">
        <button id="btnSumarCat" style="background:var(--primary); color:white; padding:0 15px;">+</button>
      </div>
      <button id="cerrarModalCat" class="btn-cancel" style="margin-top:15px;">Cerrar</button>
    </div>
  </div>

  <div id="modalTabla" class="modal">
    <div class="modal-content" style="max-width:800px; max-height:90vh; overflow:auto;">
      <h2 id="modalTablaTitulo"></h2>
      <div id="modalTablaContenido"></div>
      <button id="cerrarModalTabla" class="btn-cancel" style="margin-top:15px;">Cerrar</button>
    </div>
  </div>

  <div class="grafico-container" style="height:300px; background:var(--card); padding:15px; border-radius:10px; margin-top:20px; margin-bottom:20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <canvas id="graficoBarras"></canvas>
  </div>

  <button id="btnAgregar" class="btnFlotante">+</button>
</div>

<script src="app.js"></script>
</body>
</html>
